<!-- NeuroAdaptiveOS Horizontal Wordmark Logo -->
<svg width="400" height="80" viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon (scaled down) -->
  <g transform="translate(10, 10)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#1a237e" stroke-width="1.5"/>
    <circle cx="30" cy="16" r="2" fill="#3949ab" opacity="0.6"/>
    <circle cx="42" cy="24" r="2" fill="#3949ab" opacity="0.6"/>
    <circle cx="42" cy="40" r="2" fill="#3949ab" opacity="0.6"/>
    <circle cx="30" cy="48" r="2" fill="#3949ab" opacity="0.6"/>
    <circle cx="20" cy="40" r="2" fill="#3949ab" opacity="0.6"/>
    <circle cx="20" cy="24" r="2" fill="#3949ab" opacity="0.6"/>
    <path d="M 10 30 Q 17 24, 25 30 T 40 30 T 50 30" 
          fill="none" 
          stroke="#5e92f3" 
          stroke-width="2" 
          stroke-linecap="round"/>
    <circle cx="30" cy="30" r="3" fill="#5e92f3"/>
  </g>
  
  <!-- Text: NeuroAdaptiveOS -->
  <text x="80" y="48" 
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="28" 
        font-weight="600" 
        fill="#1a237e" 
        letter-spacing="-0.5">
    NeuroAdaptive<tspan fill="#3949ab">OS</tspan>
  </text>
  
  <!-- Tagline (optional) -->
  <text x="80" y="62" 
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="11" 
        font-weight="400" 
        fill="#5e92f3" 
        opacity="0.8" 
        letter-spacing="0.5">
    COGNITIVE LOAD DETECTION
  </text>
</svg>

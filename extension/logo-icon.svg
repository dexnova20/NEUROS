<!-- NeuroAdaptiveOS Icon Logo -->
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="64" cy="64" r="60" fill="#1a237e" opacity="0.05"/>
  
  <!-- Outer Ring -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#1a237e" stroke-width="2"/>
  
  <!-- Neural Nodes (subtle pattern) -->
  <circle cx="64" cy="32" r="3" fill="#3949ab" opacity="0.6"/>
  <circle cx="88" cy="48" r="3" fill="#3949ab" opacity="0.6"/>
  <circle cx="88" cy="80" r="3" fill="#3949ab" opacity="0.6"/>
  <circle cx="64" cy="96" r="3" fill="#3949ab" opacity="0.6"/>
  <circle cx="40" cy="80" r="3" fill="#3949ab" opacity="0.6"/>
  <circle cx="40" cy="48" r="3" fill="#3949ab" opacity="0.6"/>
  
  <!-- Connection Lines (subtle) -->
  <line x1="64" y1="32" x2="88" y2="48" stroke="#3949ab" stroke-width="1" opacity="0.3"/>
  <line x1="88" y1="48" x2="88" y2="80" stroke="#3949ab" stroke-width="1" opacity="0.3"/>
  <line x1="88" y1="80" x2="64" y2="96" stroke="#3949ab" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="96" x2="40" y2="80" stroke="#3949ab" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="80" x2="40" y2="48" stroke="#3949ab" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="48" x2="64" y2="32" stroke="#3949ab" stroke-width="1" opacity="0.3"/>
  
  <!-- Adaptive Signal Wave (smooth curve) -->
  <path d="M 20 64 Q 35 50, 50 64 T 80 64 T 108 64" 
        fill="none" 
        stroke="#5e92f3" 
        stroke-width="3" 
        stroke-linecap="round"/>
  
  <!-- Center Node (emphasis) -->
  <circle cx="64" cy="64" r="5" fill="#5e92f3"/>
</svg>
